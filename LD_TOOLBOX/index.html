<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自存-拉比的工具箱 - 卿卿我我對話美化轉換器</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="max-w-6xl mx-auto">
    <header class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-gray-800 dark:text-white mb-2">拉比的工具箱</h1>
      <p class="text-gray-600 dark:text-gray-300">上傳文字檔案，套用樣式，轉換為美化 HTML</p>
    </header>

    <div class="grid-layout">

        <!-- Control Panel (Left) -->
        <div class="control-panel">
          <!-- 1. Upload File -->
          <div class="card">
            <h2 class="card-title">上傳文件</h2>
            <div class="space-y-4">
              <div class="file-dropzone" id="dropzone">
                <input type="file" id="txt-file-input" accept=".txt" class="hidden"/>
                <div class="dropzone-content">
                  <svg class="w-8 h-8 text-gray-400 dark:text-gray-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                  </svg>
                  <p class="text-xs text-gray-600 dark:text-gray-400" id="file-name">點擊以選取 .txt 文件</p>
                </div>
              </div>
            </div>
          </div>

          <!-- 2. Select Theme -->
          <div class="card">
            <h2 class="card-title">選擇聊天室主題</h2>
            <div class="space-y-4">
              <div>
                <select id="theme-select" class="select-input">
                  <option value="basic" selected>基礎</option>
                  <option value="black">黑色</option>
                  <option value="brown">棕色</option>
                  <option value="green">綠色</option>
                </select>
              </div>
            </div>
          </div>

          <!-- 3. Select Avatar -->
          <div class="card">
            <h2 class="card-title">選擇頭像</h2>
            <div class="space-y-4">
              <!-- Character Avatar -->
              <div>
                <label class="block-label">角色 頭像</label>
                <div class="avatar-row">
                  <div class="avatar-preview" id="char-avatar-prev"></div>
                  <label for="char-avatar-input" class="btn-upload">上傳圖片</label>
                  <input type="file" id="char-avatar-input" accept="image/*" class="hidden"/>
                </div>
              </div>
              
              <!-- Player Avatar -->
              <div class="mt-4">
                <label class="block-label">玩家 頭像</label>
                <div class="avatar-row">
                  <div class="avatar-preview" id="pc-avatar-prev"></div>
                  <label for="pc-avatar-input" class="btn-upload">上傳圖片</label>
                  <input type="file" id="pc-avatar-input" accept="image/*" class="hidden"/>
                </div>
              </div>
            </div>
          </div>

          <!-- 4. Adjust Width -->
          <div class="card">
            <h2 class="card-title">調整訊息寬度</h2>
            <div class="space-y-4">
              <div class="slider-row">
                <span class="slider-label">280px</span>
                <input type="range" id="width-range" min="280" max="400" step="15" value="280" class="range-slider"/>
                <span class="slider-label">400px</span>
                <span id="width-val" class="hidden">280px</span> <!-- Keep hidden to support app.js state writing if needed -->
              </div>
            </div>
          </div>

          <!-- 5. Download HTML -->
          <div class="card no-padding bg-transparent shadow-none border-none">
            <button id="btn-download" class="btn-download" disabled>下載 HTML 文件</button>
          </div>
        </div>

        <!-- Preview Panel (Right) -->
        <div class="preview-panel">
          <div class="card h-full flex-col">
            <h2 class="card-title">預覽</h2>
            <p class="preview-subtitle">（預覽畫面僅顯示前 40 則訊息，可滾動查看內容）</p>
            <div class="preview-window">
              <div class="preview-title-bar">
                <div class="flex space-x-1">
                  <div class="w-3 h-3 bg-red-500 rounded-full"></div>
                  <div class="w-3 h-3 bg-yellow-500 rounded-full"></div>
                  <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                </div>
              </div>
              <div class="preview-content-area">
                <div class="preview-empty-state" id="preview-empty-state">
                  <div class="empty-icon">📄</div>
                  <p>尚未載入對話紀錄</p>
                  <span>請上傳對話 .txt 檔案以生成即時預覽</span>
                </div>
                <iframe id="preview-iframe" class="preview-iframe hidden" title="預覽"></iframe>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Image Crop Modal -->
  <div class="modal-overlay hidden" id="crop-modal">
    <div class="modal-card">
      <div class="modal-header">
        <h3>裁剪頭像</h3>
        <button class="btn-close" id="btn-crop-close">&times;</button>
      </div>
      <div class="modal-body">
        <p class="modal-tip">調整裁剪區域，使用方形頭像以獲得最佳顯示效果。</p>
        <div class="crop-container">
          <img id="crop-image-src" src="" alt="裁剪預覽">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btn-crop-cancel">取消</button>
        <button class="btn-primary" id="btn-crop-confirm">確認裁剪</button>
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay hidden" id="loading-spinner">
    <div class="spinner-card">
      <div class="spinner"></div>
      <p class="spinner-text">正在生成 HTML 檔案...</p>
      <span class="spinner-subtext">請稍候，這可能需要一些時間</span>
    </div>
  </div>

  <!-- Cropper.js JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
  <!-- Main Logic -->
  <script src="app.js"></script>
</body>
</html>
